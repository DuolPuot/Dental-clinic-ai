# docker-compose.monitoring.yml
# Monitoring stack for Dental Clinic AI Platform
# Usage: docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

version: '3.9'

services:
  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: dental_prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - dental_network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: dental_grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - dental_network
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: dental_alertmanager
    restart: unless-stopped
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - dental_network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9093/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Node Exporter ───────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: dental_node_exporter
    restart: unless-stopped
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - dental_network
    cap_add:
      - SYS_TIME
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9100/metrics']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── MongoDB Exporter ────────────────────────────────────────────────────────
  mongodb-exporter:
    image: percona/mongodb_exporter:latest
    container_name: dental_mongodb_exporter
    restart: unless-stopped
    ports:
      - '9216:9216'
    environment:
      MONGODB_URI: mongodb://admin:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/?authSource=admin
    networks:
      - dental_network
    depends_on:
      - mongodb
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9216/metrics']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Redis Exporter ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: dental_redis_exporter
    restart: unless-stopped
    ports:
      - '9121:9121'
    environment:
      REDIS_ADDR: redis://default:${REDIS_PASSWORD:-changeme}@redis:6379
    networks:
      - dental_network
    depends_on:
      - redis
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9121/metrics']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Loki (Log Aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: dental_loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - dental_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3100/loki/api/v1/status/buildinfo']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Promtail (Log Collector) ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: dental_promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dental_network

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:

networks:
  dental_network:
    external: true
